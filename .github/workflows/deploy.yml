name: Deploy API
on:
    push:
        branches: [ main ]
    workflow_dispatch:
jobs:
    deploy:
        runs-on: ubuntu-latest
        permissions:
            id-token: write
            contents: read
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm
            - run: npm ci
            - name: Run database migrations
              run: npm run migrate:up
              env:
                  DATABASE_URL: ${{ secrets.DATABASE_URL }}
            - uses: azure/login@v2
              with:
                  client-id: ${{ secrets.AZURE_CLIENT_ID }}
                  tenant-id: ${{ secrets.AZURE_TENANT_ID }}
                  subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
            - uses: azure/docker-login@v2
              with:
                  login-server: ${{ secrets.REGISTRY_LOGIN_SERVER }}
                  username: ${{ secrets.REGISTRY_USERNAME }}
                  password: ${{ secrets.REGISTRY_PASSWORD }}
            - run: |
                  docker build -t ${{ secrets.REGISTRY_LOGIN_SERVER }}/open-social:${{ github.sha }} .
                  docker push ${{ secrets.REGISTRY_LOGIN_SERVER }}/open-social:${{ github.sha }}
            - uses: azure/container-apps-deploy-action@v2
              with:
                  containerAppName: open-social
                  resourceGroup: open-collective-social
                  imageToDeploy: ${{ secrets.REGISTRY_LOGIN_SERVER }}/open-social:${{ github.sha
                      }}
